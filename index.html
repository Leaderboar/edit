<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #050505;
      --panel: rgba(20, 20, 20, 0.4);
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.05);
      --accent: #a855f7;
      --emerald: #10b981;
      --sapphire: #3b82f6;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      overflow-x: hidden;
    }

    .glass-card {
      background: var(--panel);
      border-radius: 1.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px var(--border);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.3s ease;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .glass-card:hover {
      transform: translateY(-12px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), 0 30px 60px -15px rgba(168, 85, 247, 0.3);
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(168, 85, 247, 0.04),
        transparent 40%
      );
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 1;
    }

    .glass-card::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 3.5px;
      background: radial-gradient(
        400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(168, 85, 247, 0.8),
        rgba(16, 185, 129, 0.8) 40%,
        rgba(59, 130, 246, 0.6) 70%,
        transparent 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .glass-card:hover::before,
    .glass-card:hover::after {
      opacity: 1;
    }

    .glass-card > * {
      position: relative;
      z-index: 3;
    }
  #app {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}


    .container {
      width: 100%;
      max-width: 720px;
      padding: 22px;
      margin-top: 10px;
      margin: 20px auto;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    h1, h2, p {
      margin-top: 0;
    }

    h1 {
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      margin-bottom: 18px;
      letter-spacing: 0.02em;
    }

    h2#listTitle {
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      margin: 10px 0 18px;
      color: #e9d5ff;
    }

    .add-form {
      display: grid;
      grid-template-columns: 1.4fr 0.7fr 0.8fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .add-form input,
    .auth-box input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      outline: none;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    }

    .add-form input:focus,
    .auth-box input:focus {
      border-color: rgba(168, 85, 247, 0.65);
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.12);
    }

    button {
      padding: 12px 12px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .btn-add {
      background: linear-gradient(135deg, #c084fc, #8b5cf6);
      color: #14081f;
      box-shadow: 0 12px 28px rgba(168, 85, 247, 0.18);
    }

    .btn-add:hover {
      box-shadow: 0 16px 34px rgba(168, 85, 247, 0.26);
    }

    .player-row {
      padding: 14px;
      border-radius: 1.25rem;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      will-change: transform;
    }

    .player-row:hover {
      box-shadow: 0 18px 40px -20px rgba(168, 85, 247, 0.35);
      border-color: rgba(168, 85, 247, 0.22);
    }

    .player-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .player-name-block {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      min-width: 0;
    }

    .player-name-block span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-num {
      font-weight: 700;
      color: #cbd5e1;
      min-width: 28px;
      text-align: center;
    }

    .player-score {
      font-size: 24px;
      color: #86efac;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .score-btns {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .btn-minus {
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.22);
    }

    .btn-plus {
      background: rgba(16, 185, 129, 0.12);
      color: #a7f3d0;
      border: 1px solid rgba(16, 185, 129, 0.22);
    }

    .btn-del {
      margin-top: 5px;
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.55);
      color: #fca5a5;
    }

    .btn-del:hover {
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }

    .footer {
      text-align: center;
      padding: 30px 10px 10px;
      color: #64748b;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .footer a {
      color: #c084fc;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: white;
    }

    .footer i {
      font-size: 12px;
      margin-left: 4px;
      color: #475569;
    }

    .auth {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(168, 85, 247, 0.15), transparent 35%), #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .auth-box {
      width: 100%;
      max-width: 360px;
      padding: 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .auth-box h3 {
      margin: 0 0 10px;
      font-size: 1.6rem;
      color: #f5f3ff;
    }

    .auth-box p {
      margin: 0 0 16px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .auth-box button {
      margin-top: 12px;
      width: 100%;
      background: linear-gradient(135deg, #c084fc, #8b5cf6);
      color: #14081f;
      box-shadow: 0 12px 28px rgba(168, 85, 247, 0.18);
    }

    .auth-box button:hover {
      box-shadow: 0 16px 34px rgba(168, 85, 247, 0.26);
    }

    .lock-screen {
      background: radial-gradient(circle at top, rgba(168, 85, 247, 0.15), transparent 35%), #050505;
      color: #ff4b2b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      margin: 0;
      overflow: hidden;
      text-align: center;
      padding: 20px;
    }

    .lock-screen h1 {
      font-size: 2.8rem;
      text-shadow: 0 0 20px #ff4b2b;
      margin-bottom: 10px;
    }

    .lock-screen p {
      font-size: 1.2rem;
      color: #d8b4e2;
      margin-bottom: 20px;
    }

    #countdown {
      font-size: 6rem;
      font-weight: 700;
      color: #c084fc;
      text-shadow: 0 0 30px #a855f7;
    }

    .lock-footer {
      margin-top: 30px;
      border-top: 1px solid rgba(168, 85, 247, 0.3);
      padding-top: 20px;
      color: rgba(216, 180, 226, 0.5);
    }

    #adminList:empty::before {
      content: "Loading...";
      color: #94a3b8;
      display: block;
      padding: 12px 2px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 16px;
      }

      .add-form {
        grid-template-columns: 1fr 0.8fr;
      }

      #addBtn {
        grid-column: 1 / -1;
      }

      .score-btns {
        grid-template-columns: repeat(3, 1fr);
      }

      .player-info {
        align-items: flex-start;
        flex-direction: column;
      }

      .player-score {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<div id="auth" class="auth">
  <div class="auth-box glass-card">
    <h3>Control Panel</h3>
    <p>Enter password to access the panel.</p>
    <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
    <button id="enter">Enter</button>
  </div>
</div>

<div id="app" style="display:none; width:100%;">
  <div class="container glass-card">
    <h1>⚙️ Leaderboard</h1>

    <div class="add-form">
      <input id="newName" placeholder="Name">
      <input id="newScore" type="number" placeholder="Score">
      <button id="addBtn" class="btn-add">Add</button>
    </div>

    <h2 id="listTitle" style="cursor: pointer;" title="Click to rename"></h2>
    <div id="adminList"></div>
  </div>
</div>

<footer class="footer">
  Made by <a href="https://AbdurahmonovBehruz.github.io/Info">Behruz</a>
  <i class="fa-solid fa-arrow-up-right-from-square"></i>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioCtx();

  function beep(f = 600, t = 80, v = 0.05) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    o.type = "sine";
    g.gain.value = v;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + t / 1000);
  }

  document.addEventListener("click", () => {
    if (audioCtx.state === "suspended") audioCtx.resume();
  }, { once: true });

  const correctPassword = [83,97,114,100,111,114,50,54].map(x => String.fromCharCode(x)).join('');
const redirectUrl = "https://abdurahmonovbehruz.github.io/Redirector"; // Имя файла твоей главной панели (например, index.html или panel.html)
    let secondsLeft = 5;
  document.getElementById("enter").onclick = () => {
    const val = document.getElementById("pass").value;
    if (val === correctPassword) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";
      start();
    } else {
      document.documentElement.innerHTML = `
            <body style="background: radial-gradient(circle, #2d1045 0%, #120324 100%); color: #ff4b2b; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden;">
                <h1 style="font-size: 2.8rem; text-shadow: 0 0 20px #ff4b2b; margin-bottom: 10px;">ACCESS DENIED🛑</h1>
                <p style="font-size: 1.4rem; color: #d8b4e2; margin-bottom: 20px;">Incorrect password. Redirecting:</p>
                <div id="countdown" style="font-size: 6rem; font-weight: bold; color: #c084fc; text-shadow: 0 0 30px #a855f7;">5</div>
                <div style="margin-top: 30px; border-top: 1px solid rgba(168, 85, 247, 0.3); padding-top: 20px; color: rgba(216, 180, 226, 0.5);">
                    SYSTEM LOCKDOWN ACTIVE
                </div>
            </body>
        `;

        const timerElement = document.getElementById('countdown');
        
        const countdownInterval = setInterval(() => {
            secondsLeft--;
            timerElement.innerText = secondsLeft;

            if (secondsLeft <= 0) {
                clearInterval(countdownInterval);
                
                // Попытка №1: Закрыть вкладку
                window.close();
                
                // Попытка №2: Если вкладка всё еще открыта, делаем редирект
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 500); 
            }
        }, 1000);
    }
  };

  function start() {
    const firebaseConfig = {
      apiKey: "AIzaSyBFKNH17HTqnIQk6HMDxBWmUCmiPwpf3D8",
      authDomain: "namelist-1bf07.firebaseapp.com",
      databaseURL: "https://namelist-1bf07-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "namelist-1bf07",
      storageBucket: "namelist-1bf07.firebasestorage.app",
      messagingSenderId: "325136855046",
      appId: "1:325136855046:web:bac259ab885ca8381fd387"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const playersRef = ref(db, "players");

    const adminList = document.getElementById("adminList");

    let data = {};
    let pending = {};
    let timers = {};
    let stable = [];
    let reorderTimer = null;

    function sort() {
      return Object.entries(data)
        .sort((a, b) => (b[1].score || 0) - (a[1].score || 0))
        .map(x => x[0]);
    }

    function scheduleReorder() {
      clearTimeout(reorderTimer);
      reorderTimer = setTimeout(() => {
        stable = sort();
        render(true);
        beep(400, 120);
      }, 3000);
    }

    function change(id, delta) {
      const current = pending[id] ?? data[id].score;
      const newScore = current + delta;

      pending[id] = newScore;
      data[id].score = newScore;
      render(false);

      clearTimeout(timers[id]);
      timers[id] = setTimeout(() => {
        update(ref(db, "players/" + id), { score: newScore });
        delete pending[id];
        delete timers[id];
        beep(700, 100);
        scheduleReorder();
      }, 3000);
    }

    function render(anim) {
      if (!stable.length) stable = sort();

      adminList.innerHTML = "";

      stable.forEach((id, i) => {
        const p = data[id];
        if (!p) return;

        const row = document.createElement("div");
        row.className = "player-row glass-card";

        row.innerHTML = `
          <div class="player-info">
            <div class="player-name-block">
              <span class="rank-num">${i < 3 ? ["🥇","🥈","🥉"][i] : i + 1}</span>
              <span>${p.name}</span>
            </div>
            <div class="player-score">${p.score}</div>
          </div>

          <div class="controls">
            <div class="score-btns">
              <button class="btn-minus">-3</button>
              <button class="btn-minus">-2</button>
              <button class="btn-minus">-1</button>
              <button class="btn-plus">+1</button>
              <button class="btn-plus">+2</button>
              <button class="btn-plus">+3</button>
            </div>
            <button class="btn-del">Delete</button>
          </div>
        `;

        const btns = row.querySelectorAll("button");
        const del = btns[btns.length - 1];
        del.onclick = () => remove(ref(db, "players/" + id));

        const deltas = [-3, -2, -1, 1, 2, 3];
        btns.forEach((b, idx) => {
          if (idx < 6) b.onclick = () => change(id, deltas[idx]);
        });

        adminList.appendChild(row);
      });
    }

    onValue(playersRef, snap => {
      data = snap.val() || {};
      stable = sort();
      render(false);
    });

    document.getElementById("addBtn").onclick = () => {
      const n = document.getElementById("newName");
      const s = document.getElementById("newScore");

      if (!n.value.trim()) return;

      push(playersRef, {
        name: n.value.trim(),
        score: Number(s.value || 0)
      });

      n.value = "";
      s.value = "";
    };

    const titleRef = ref(db, "settings/title");
    const titleElement = document.getElementById("listTitle");

    onValue(titleRef, (snapshot) => {
      const newTitle = snapshot.val();
      if (newTitle) {
        titleElement.innerText = newTitle;
      }
    });

    titleElement.onclick = () => {
      const currentTitle = titleElement.innerText;
      const updatedTitle = prompt("Enter new title:", currentTitle);

      if (updatedTitle !== null && updatedTitle.trim() !== "") {
        set(titleRef, updatedTitle.trim());
      }
    };

    const trackedCards = document.querySelectorAll('.glass-card');
    trackedCards.forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mouse-x', `${x}%`);
        card.style.setProperty('--mouse-y', `${y}%`);
      });
    });
  }
</script>
</body>
</html>
