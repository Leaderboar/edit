<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #050505;
      --panel: rgba(20, 20, 20, 0.4);
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.05);
      --accent: #a855f7;
      --emerald: #10b981;
      --sapphire: #3b82f6;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      overflow-x: hidden;
    }

    .glass-card {
      background: var(--panel);
      border-radius: 1.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px var(--border);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.3s ease;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .glass-card:hover {
      transform: translateY(-12px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), 0 30px 60px -15px rgba(168, 85, 247, 0.3);
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(168, 85, 247, 0.04),
        transparent 40%
      );
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 1;
    }

    .glass-card::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 3.5px;
      background: radial-gradient(
        400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(168, 85, 247, 0.8),
        rgba(16, 185, 129, 0.8) 40%,
        rgba(59, 130, 246, 0.6) 70%,
        transparent 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .glass-card:hover::before,
    .glass-card:hover::after {
      opacity: 1;
    }

    .glass-card > * {
      position: relative;
      z-index: 3;
    }
  #app {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;

}

.hidden {

}

.modal-box {

.modal-actions {

}

h1::after {

    h2#listTitle {

    .add-form {

    button {

}

    .btn-add:hover {

}

.btn-add:hover::after {

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioCtx();
  

  function beep(f = 600, t = 80, v = 0.05) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    o.type = "sine";
    g.gain.value = v;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + t / 1000);
  }

  document.addEventListener("click", () => {
    if (audioCtx.state === "suspended") audioCtx.resume();
  }, { once: true });

  const correctPassword = [83,97,114,100,111,114,50,54].map(x => String.fromCharCode(x)).join('');

  }, 120);

  function start() {
    const firebaseConfig = {
      apiKey: "AIzaSyBFKNH17HTqnIQk6HMDxBWmUCmiPwpf3D8",
      authDomain: "namelist-1bf07.firebaseapp.com",

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const playersRef = ref(db, "players");

    const adminList = document.getElementById("adminList");

    let data = {};
    let pending = {};
    let timers = {};
    let stable = [];
    let reorderTimer = null;

    function sort() {
      return Object.entries(data)
        .sort((a, b) => (b[1].score || 0) - (a[1].score || 0))
        .map(x => x[0]);
    }

    function scheduleReorder() {
      clearTimeout(reorderTimer);
      reorderTimer = setTimeout(() => {

    }

    function change(id, delta) {
      const current = pending[id] ?? data[id].score;
      const newScore = current + delta;

      pending[id] = newScore;
      data[id].score = newScore;
      render(false);

      clearTimeout(timers[id]);
      timers[id] = setTimeout(() => {
        update(ref(db, "players/" + id), { score: newScore });
        delete pending[id];
        delete timers[id];
        beep(700, 100);
        scheduleReorder();
      }, 3000);
    }
let deleteTargetId = null;
let deleteTargetName = "";

const confirmBtn = document.getElementById("confirmDelete");

};

    function render(anim) {

      stable.forEach((id, i) => {

          <div class="player-info">
            <div class="player-name-block">
              <span class="rank-num">${i < 3 ? ["🥇","🥈","🥉"][i] : i + 1}</span>
              <span>${p.name}</span>
            </div>
            <div class="player-score">${p.score}</div>
          </div>

          <div class="controls">
            <div class="score-btns">
              <button class="btn-minus">-3</button>
              <button class="btn-minus">-2</button>
              <button class="btn-minus">-1</button>
              <button class="btn-plus">+1</button>
              <button class="btn-plus">+2</button>
              <button class="btn-plus">+3</button>
            </div>
            <button class="btn-del">Delete</button>
          </div>
        `;

        const btns = row.querySelectorAll("button");
        const del = btns[btns.length - 1];
        del.onclick = () => {
  deleteTargetId = id;
  deleteTargetName = p.name;

  confirmText.innerText = `Are you sure you want to delete "${p.name}"? This action cannot be undone.`;
  modal.classList.remove("hidden");
};

        const deltas = [-3, -2, -1, 1, 2, 3];
        btns.forEach((b, idx) => {
          if (idx < 6) b.onclick = () => change(id, deltas[idx]);
        });

        adminList.appendChild(row);
      });
    }

    onValue(playersRef, snap => {
      data = snap.val() || {};
      stable = sort();
      render(false);
    });

    document.getElementById("addBtn").onclick = () => {
      const n = document.getElementById("newName");
      const s = document.getElementById("newScore");

      if (!n.value.trim()) return;

      push(playersRef, {
        name: n.value.trim(),
        score: Number(s.value || 0)
      });

      n.value = "";
      s.value = "";
    };

    const titleRef = ref(db, "settings/title");
    const titleElement = document.getElementById("listTitle");

    onValue(titleRef, (snapshot) => {
      const newTitle = snapshot.val();
      if (newTitle) {
        titleElement.innerText = newTitle;
      }
    });

    titleElement.onclick = () => {
      const currentTitle = titleElement.innerText;
      const updatedTitle = prompt("Enter new title:", currentTitle);

      if (updatedTitle !== null && updatedTitle.trim() !== "") {
        set(titleRef, updatedTitle.trim());
      }
    };

    const trackedCards = document.querySelectorAll('.glass-card');
    trackedCards.forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mouse-x', `${x}%`);
        card.style.setProperty('--mouse-y', `${y}%`);
      });
    });
  }
  
  document.getElementById("pass").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    document.getElementById("enter").click();
  }
});
  
  document.getElementById("pass").focus();
</script>
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
