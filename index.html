<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: #0f172a; 
      color: #f8fafc; 
      display: flex; 
      flex-direction: column; /* Направление - колонка */
      align-items: center;
      min-height: 100vh; /* Высота на весь экран */
      margin: 0;
      padding: 10px;
    }

    .container { 
      width: 100%; 
      max-width: 600px; 
      background: #1e293b; 
      padding: 15px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
      border: 1px solid #334155;
      margin-top: 10px;
      margin-bottom: auto; /* Магия: выталкивает всё, что ниже, в самый низ */
    }

    .add-form { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    #newName { flex: 2 1 200px; }
    #newScore { flex: 1 1 80px; }
    #addBtn { flex: 1 1 100%; }

    .player-row { 
      background: #27374d; 
      padding: 12px; 
      border-radius: 12px; 
      margin-bottom: 12px; 
      border: 1px solid #334155; 
    }

    .player-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .player-name-block { display: flex; align-items: center; gap: 10px; font-size: 18px; }
    .rank-num { font-weight: bold; color: #94a3b8; min-width: 25px; }
    .player-score { font-size: 22px; color: #34d399; font-weight: bold; }

    .controls { display: flex; flex-direction: column; gap: 10px; }
    .score-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }

    button { padding: 10px 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    
    @media (min-width: 480px) {
      .controls { flex-direction: row; justify-content: space-between; }
      #addBtn { flex: 0; }
      .container { padding: 25px; }
    }

    .btn-add { background: #38bdf8; color: #0f172a; }
    .btn-minus { background: #ef4444; color: white; }
    .btn-plus { background: #10b981; color: white; }
    .btn-del { background: transparent; border: 1px solid #ef4444; color: #ef4444; margin-top: 5px; }
    
    @media (min-width: 480px) { .btn-del { margin-top: 0; } }

    /* Стили футера */
    .footer {
      text-align: center;
      padding: 30px 10px;
      color: #64748b;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .footer a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s;
    }
    .footer a:hover { color: white; }
    .footer i { font-size: 12px; margin-left: 3px; color: #475569; }
  </style>
</head>
<body>

<div class="container">
  <h1>⚙️ Control panel</h1>
  
  <div class="add-form">
    <input type="text" id="newName" placeholder="Name">
    <input type="number" id="newScore" placeholder="Score" value="" style="max-width: 100px;">
    <button id="addBtn" class="btn-add">Add</button>
  </div>

 <h2 id="listTitle" style="cursor: pointer;" title="Click to rename"></h2>

  <div id="adminList">Loading...</div>
</div>

<footer class="footer">
  Made by <a href="https://AbdurahmonovBehruz.github.io/Info" >Behruz</a> 
  <i class="fa-solid fa-arrow-up-right-from-square"></i>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBFKNH17HTqnIQk6HMDxBWmUCmiPwpf3D8",
    authDomain: "namelist-1bf07.firebaseapp.com",
    databaseURL: "https://namelist-1bf07-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "namelist-1bf07",
    storageBucket: "namelist-1bf07.firebasestorage.app",
    messagingSenderId: "325136855046",
    appId: "1:325136855046:web:bac259ab885ca8381fd387"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const playersRef = ref(db, 'players');

  document.getElementById('addBtn').onclick = () => {
    const nameInput = document.getElementById('newName');
    const scoreInput = document.getElementById('newScore');
    if (nameInput.value.trim() !== '') {
      const newPlayerRef = push(playersRef);
      set(newPlayerRef, {
        name: nameInput.value.trim(),
        score: Number(scoreInput.value) || 0
      });
      nameInput.value = '';
      scoreInput.value = '';
    }
  };

  onValue(playersRef, (snapshot) => {
    const data = snapshot.val();
    const adminList = document.getElementById('adminList');
    adminList.innerHTML = '';

    if (!data) {
      adminList.innerHTML = 'List is empty';
      return;
    }

    const playersArray = Object.keys(data).map(key => ({ id: key, ...data[key] }));
    playersArray.sort((a, b) => b.score - a.score);

    playersArray.forEach((player, index) => {
      // Логика медалей
      let rankDisplay = index + 1;
      if (index === 0) rankDisplay = '🥇';
      else if (index === 1) rankDisplay = '🥈';
      else if (index === 2) rankDisplay = '🥉';

      const row = document.createElement('div');
      row.className = 'player-row';
      
      row.innerHTML = `
        <div class="player-info">
          <div class="player-name-block">
            <span class="rank-num">${rankDisplay}</span>
            <span>${player.name}</span>
          </div>
          <span class="player-score">${player.score}</span>
        </div>
        <div class="controls">
          <div class="score-btns">
            <button class="btn-minus" id="minus5-${player.id}">-5</button>
            <button class="btn-minus" id="minus1-${player.id}">-1</button>
            <button class="btn-plus" id="plus1-${player.id}">+1</button>
            <button class="btn-plus" id="plus5-${player.id}">+5</button>
          </div>
          <button class="btn-del" id="del-${player.id}">Delete</button>
        </div>
      `;
      adminList.appendChild(row);

      const changeScore = (amount) => {
        update(ref(db, `players/${player.id}`), { score: player.score + amount });
      };

      document.getElementById(`minus5-${player.id}`).onclick = () => changeScore(-5);
      document.getElementById(`minus1-${player.id}`).onclick = () => changeScore(-1);
      document.getElementById(`plus1-${player.id}`).onclick = () => changeScore(1);
      document.getElementById(`plus5-${player.id}`).onclick = () => changeScore(5);
      document.getElementById(`del-${player.id}`).onclick = () => {
        if(confirm(`Commit deleting ${player.name}`)) remove(ref(db, `players/${player.id}`));
      };
    });
  });
  
  
  
  
  
  // --- ЛОГИКА ИЗМЕНЕНИЯ ЗАГОЛОВКА ---
const titleRef = ref(db, 'settings/title');
const titleElement = document.getElementById('listTitle');

// 1. Слушаем изменение заголовка в базе
onValue(titleRef, (snapshot) => {
  const newTitle = snapshot.val();
  if (newTitle) {
    titleElement.innerText = newTitle;
  }
});

// 2. Меняем заголовок при клике
titleElement.onclick = () => {
  const currentTitle = titleElement.innerText;
  const updatedTitle = prompt("Enter new title:", currentTitle);
  
  if (updatedTitle !== null && updatedTitle.trim() !== "") {
    set(titleRef, updatedTitle.trim()); // Сохраняем в папку settings/title
  }
};

</script>
</body>
</html>
